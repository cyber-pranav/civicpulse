name: CI/CD Pipeline & Cloud Run Deploy

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  PROJECT_ID: capable-boulder-492305-t1
  SERVICE_NAME: civicpulse-engine
  REGION: us-central1

jobs:
  test_and_lint:
    name: Lint & Automated Testing
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest-cov
        
    - name: Run Ruff Linter
      run: |
        ruff check backend/ tests/
        
    - name: Execute Pytest Suite with Coverage
      run: |
        python -m pytest tests/ -v --cov=backend --cov-fail-under=75
        
  deploy:
    name: Deploy to Cloud Run
    needs: test_and_lint
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Build and Push Docker Image
      run: |
        IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/civicpulse-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
        docker build -t $IMAGE_TAG .
        docker push $IMAGE_TAG

    - name: Deploy to Cloud Run
      id: deploy
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/civicpulse-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
        env_vars: |
          GOOGLE_CIVIC_API_KEY=${{ secrets.GOOGLE_CIVIC_API_KEY }}
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
        flags: '--allow-unauthenticated --memory=256Mi --cpu=1 --max-instances=10'

    - name: Show Output
      run: echo "Service deployed successfully at ${{ steps.deploy.outputs.url }}"
